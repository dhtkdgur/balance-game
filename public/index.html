<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>밸런스 게임</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', -apple-system, 'Malgun Gothic', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .logo { font-size: 4rem; margin-bottom: 1rem; }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: .5rem;
      text-align: center;
    }

    .subtitle {
      color: #8b949e;
      font-size: 1rem;
      margin-bottom: 3rem;
      text-align: center;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
      width: 100%;
      max-width: 560px;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .8rem;
      padding: 2rem 1.5rem;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.1rem;
      transition: transform .15s, filter .15s;
      border: 2px solid transparent;
    }
    .card:hover { transform: translateY(-3px); filter: brightness(1.1); }
    .card:active { transform: scale(.97); }

    .card-icon { font-size: 2.5rem; }

    .card-host {
      background: #1d3a5f;
      border-color: #3b82f6;
      color: #93c5fd;
    }
    .card-host .card-title { color: #e6edf3; }

    .card-participant {
      background: #5c2a0a;
      border-color: #f97316;
      color: #fdba74;
    }
    .card-participant .card-title { color: #e6edf3; }

    .card-title { font-size: 1.3rem; }
    .card-desc  { font-size: .82rem; text-align: center; line-height: 1.4; opacity: .8; }

    .url-box {
      margin-top: 2.5rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 1rem 1.4rem;
      text-align: center;
      max-width: 560px;
      width: 100%;
    }
    .url-box .label { font-size: .78rem; color: #8b949e; margin-bottom: .4rem; }
    .url-box .url   { font-size: .9rem; color: #58a6ff; word-break: break-all; }

    @media (max-width: 480px) {
      .cards { grid-template-columns: 1fr; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <div class="logo">⚖️</div>
  <h1>밸런스 게임</h1>
  <p class="subtitle">A vs B, 당신의 선택은?</p>

  <div class="cards">
    <a class="card card-host" href="/host.html">
      <span class="card-icon">🎛️</span>
      <span class="card-title">진행자</span>
      <span class="card-desc">질문 관리 및<br>실시간 결과 확인</span>
    </a>
    <a class="card card-participant" href="/participant.html">
      <span class="card-icon">📱</span>
      <span class="card-title">참가자</span>
      <span class="card-desc">투표에 참여하려면<br>여기를 눌러주세요</span>
    </a>
  </div>

  <div class="url-box">
    <div class="label">참가자 링크 (공유용)</div>
    <div class="url" id="participant-url"></div>
  </div>

  <script>
    const base = location.origin;
    document.getElementById('participant-url').textContent = base + '/participant.html';
  </script>
</body>
</html>
