<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>밸런스 게임</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #582B2B;
      --bg2:      #3D1A1A;
      --bg3:      #4A2323;
      --border:   #7A4040;
      --text:     #FAECB6;
      --muted:    #C9A96E;
      --a:        #F9A822;
      --a-dim:    #4A3500;
      --b:        #E8874A;
      --b-dim:    #472010;
      --a-hover:  #D98E18;
      --b-hover:  #C96E35;
      --accent:   #C87A40;
      --red:      #E85454;
      --radius-sm:   8px;
      --radius-md:   12px;
      --radius-lg:   20px;
      --radius-pill: 9999px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.04) inset;
      --shadow-md: 0 4px 16px rgba(0,0,0,.55), 0 1px 0 rgba(255,255,255,.05) inset;
      --shadow-lg: 0 24px 64px rgba(0,0,0,.7), 0 8px 24px rgba(0,0,0,.5);
      --focus-ring: 0 0 0 3px rgba(249,168,34,.45);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    :focus-visible {
      outline: 3px solid rgba(249,168,34,.9);
      outline-offset: 2px;
      box-shadow: var(--focus-ring);
    }
    @media (forced-colors: active) {
      :focus-visible { outline: 3px solid ButtonText; box-shadow: none; }
    }

    .logo { font-size: 4rem; margin-bottom: 1rem; }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: .5rem;
      text-align: center;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 3rem;
      text-align: center;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
      width: 100%;
      max-width: 560px;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .8rem;
      padding: 2rem 1.5rem;
      border-radius: var(--radius-md);
      text-decoration: none;
      font-weight: 700;
      font-size: 1.1rem;
      transition: transform 250ms cubic-bezier(.34,1.56,.64,1), box-shadow 250ms cubic-bezier(0,0,.2,1);
      border: 2px solid transparent;
      box-shadow: var(--shadow-sm);
    }
    .card:hover { transform: translateY(-5px) scale(1.01); box-shadow: var(--shadow-md); }
    .card:active { transform: scale(.96); }

    .card-icon { font-size: 2.5rem; }

    .card-host {
      background: var(--a-dim);
      border-color: var(--a);
      color: var(--text);
    }

    .card-participant {
      background: var(--b-dim);
      border-color: var(--b);
      color: var(--text);
    }

    .card-title { font-size: 1.3rem; color: var(--text); }
    .card-desc  { font-size: .82rem; text-align: center; line-height: 1.4; color: var(--muted); }

    .url-box {
      margin-top: 2.5rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem 1.4rem;
      text-align: center;
      max-width: 560px;
      width: 100%;
      box-shadow: var(--shadow-sm);
    }
    .url-box .label { font-size: .78rem; color: var(--muted); margin-bottom: .4rem; }
    .url-box .url   { font-size: .9rem; color: var(--a); word-break: break-all; }

    @media (max-width: 480px) {
      .cards { grid-template-columns: 1fr; }
      h1 { font-size: 1.8rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="logo">⚖️</div>
  <h1>밸런스 게임</h1>
  <p class="subtitle">A vs B, 당신의 선택은?</p>

  <div class="cards">
    <a class="card card-host" href="/host.html">
      <span class="card-icon">🎛️</span>
      <span class="card-title">진행자</span>
      <span class="card-desc">질문 관리 및<br>실시간 결과 확인</span>
    </a>
    <a class="card card-participant" href="/participant.html">
      <span class="card-icon">📱</span>
      <span class="card-title">참가자</span>
      <span class="card-desc">투표에 참여하려면<br>여기를 눌러주세요</span>
    </a>
  </div>

  <div class="url-box">
    <div class="label">참가자 링크 (공유용)</div>
    <div class="url" id="participant-url"></div>
  </div>

  <script>
    const base = location.origin;
    document.getElementById('participant-url').textContent = base + '/participant.html';
  </script>
</body>
</html>
